name: Phase task
description: Implementation task for a launcher phase
title: "[Phase N] "
labels: ["needs-triage"]
body:
  - type: dropdown
    id: phase
    attributes:
      label: Phase
      options:
        - "0 - GitHub / infra"
        - "1 - KMP init"
        - "2 - UI dashboard"
        - "3 - Downloader / extractor"
        - "4 - Process launcher"
        - "5 - Shader background"
        - "6 - CI/CD"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checklist of done conditions
      value: |
        - [ ]
        - [ ]
    validations:
      required: true
