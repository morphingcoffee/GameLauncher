name: R2 env check

on:
  workflow_dispatch:

concurrency:
  group: r2-env-check
  cancel-in-progress: true

jobs:
  check:
    name: Validate R2 secrets and token scopes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Run R2 env check
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_CDN_BASE_URL: ${{ secrets.R2_PUBLIC_CDN_BASE_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: python3 tools/deploy/r2_env_check.py
