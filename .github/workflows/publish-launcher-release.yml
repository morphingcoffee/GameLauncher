name: Publish launcher release

on:
  workflow_dispatch:
    inputs:
      build_workflow_run_id:
        description: >
          Run ID from a successful Desktop installers workflow
          (numeric ID from the run URL, e.g. 12345678901)
        required: true
        type: string
      ref:
        description: Git ref to commit manifest changes to
        required: false
        default: main
      require_all_channels:
        description: Require all four prod channels (full cross-platform release)
        type: boolean
        default: true
      bump_minimum:
        description: Bump launcher_minimum_version (breaking manifest change)
        type: boolean
        default: false
      skip_git_push:
        description: Upload to R2 only — do not commit or push manifests/manifest.json
        type: boolean
        default: false

permissions:
  contents: write
  actions: read

concurrency:
  group: publish-launcher-release
  cancel-in-progress: false

jobs:
  publish:
    name: Publish prod launcher to R2
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Validate build workflow run
        env:
          BUILD_RUN_ID: ${{ github.event.inputs.build_workflow_run_id }}
          REQUIRE_ALL_CHANNELS: ${{ github.event.inputs.require_all_channels }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          metadata=$(gh api "repos/${{ github.repository }}/actions/runs/${BUILD_RUN_ID}")
          name=$(echo "$metadata" | jq -r .name)
          conclusion=$(echo "$metadata" | jq -r .conclusion)
          if [ "$name" != "Desktop installers" ]; then
            echo "Expected 'Desktop installers' workflow, got: ${name}"
            exit 1
          fi
          if [ "$conclusion" != "success" ]; then
            echo "Build workflow must succeed before publish (conclusion=${conclusion})"
            exit 1
          fi

          artifacts=$(gh api "repos/${{ github.repository }}/actions/runs/${BUILD_RUN_ID}/artifacts" --jq '.artifacts[].name')
          echo "Artifacts in build run:"
          echo "$artifacts"

          prod_artifacts=(
            GameLauncher-windows-msi-prod
            GameLauncher-windows-portable-prod
            GameLauncher-macos-arm64-prod
            GameLauncher-macos-x64-prod
          )

          publish_channels=()
          for artifact in "${prod_artifacts[@]}"; do
            if echo "$artifacts" | grep -qx "$artifact"; then
              case "$artifact" in
                GameLauncher-windows-msi-prod) publish_channels+=("windows-x64-msi") ;;
                GameLauncher-windows-portable-prod) publish_channels+=("windows-x64-portable") ;;
                GameLauncher-macos-arm64-prod) publish_channels+=("macos-arm64-dmg") ;;
                GameLauncher-macos-x64-prod) publish_channels+=("macos-x64-dmg") ;;
              esac
            elif [ "$REQUIRE_ALL_CHANNELS" = "true" ]; then
              echo "Missing artifact from build run: ${artifact}"
              echo "Uncheck require_all_channels to publish only the artifacts present."
              exit 1
            fi
          done

          if [ "${#publish_channels[@]}" -eq 0 ]; then
            echo "No prod launcher artifacts found in build run."
            exit 1
          fi

          channels_csv=$(IFS=,; echo "${publish_channels[*]}")
          echo "PUBLISH_CHANNELS=${channels_csv}" >> "$GITHUB_ENV"
          echo "BUILD_RUN_NUMBER=$(echo "$metadata" | jq -r .run_number)" >> "$GITHUB_ENV"
          echo "Will publish channels: ${channels_csv}"

      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./launcher/gradlew

      - name: Resolve artifact version
        working-directory: launcher
        run: |
          echo "ARTIFACT_VERSION=$(./gradlew -q :composeApp:printArtifactVersion --no-daemon -PbuildNumber="$BUILD_RUN_NUMBER")" >> "$GITHUB_ENV"

      - name: Download Windows MSI (prod)
        if: contains(env.PUBLISH_CHANNELS, 'windows-x64-msi')
        uses: actions/download-artifact@v6
        with:
          name: GameLauncher-windows-msi-prod
          run-id: ${{ github.event.inputs.build_workflow_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts/windows-msi

      - name: Download Windows portable ZIP (prod)
        if: contains(env.PUBLISH_CHANNELS, 'windows-x64-portable')
        uses: actions/download-artifact@v6
        with:
          name: GameLauncher-windows-portable-prod
          run-id: ${{ github.event.inputs.build_workflow_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts/windows-portable

      - name: Download macOS arm64 DMG (prod)
        if: contains(env.PUBLISH_CHANNELS, 'macos-arm64-dmg')
        uses: actions/download-artifact@v6
        with:
          name: GameLauncher-macos-arm64-prod
          run-id: ${{ github.event.inputs.build_workflow_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts/macos-arm64

      - name: Download macOS x64 DMG (prod)
        if: contains(env.PUBLISH_CHANNELS, 'macos-x64-dmg')
        uses: actions/download-artifact@v6
        with:
          name: GameLauncher-macos-x64-prod
          run-id: ${{ github.event.inputs.build_workflow_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts/macos-x64

      - name: Stage prod launcher artifacts
        env:
          PUBLISH_CHANNELS: ${{ env.PUBLISH_CHANNELS }}
        run: |
          set -euo pipefail
          stage_channel() {
            local src_dir="$1"
            local channel="$2"
            local pattern="$3"
            if [[ ",${PUBLISH_CHANNELS}," != *,"${channel},"* ]]; then
              return 0
            fi
            local file
            file=$(find "$src_dir" -name "$pattern" | head -1)
            if [ -z "$file" ]; then
              echo "No file matching ${pattern} under ${src_dir}"
              exit 1
            fi
            mkdir -p "r2_staging/launcher/releases/${ARTIFACT_VERSION}/${channel}"
            cp "$file" "r2_staging/launcher/releases/${ARTIFACT_VERSION}/${channel}/"
          }
          stage_channel artifacts/windows-msi windows-x64-msi 'GameLauncher-*.msi'
          stage_channel artifacts/windows-portable windows-x64-portable 'GameLauncher-*.zip'
          stage_channel artifacts/macos-arm64 macos-arm64-dmg 'GameLauncher-*-macos-arm64.dmg'
          stage_channel artifacts/macos-x64 macos-x64-dmg 'GameLauncher-*-macos-x64.dmg'

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Publish launcher release
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_CDN_BASE_URL: ${{ secrets.R2_PUBLIC_CDN_BASE_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          args=(python3 tools/deploy/publish_launcher_release.py "$ARTIFACT_VERSION")
          if [ "${{ github.event.inputs.bump_minimum }}" = "true" ]; then
            args+=(--bump-minimum)
          fi
          if [ "${{ github.event.inputs.skip_git_push }}" = "true" ]; then
            args+=(--skip-git-push)
          fi
          "${args[@]}"

      - name: Publish summary
        env:
          PUBLISH_CHANNELS: ${{ env.PUBLISH_CHANNELS }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ### Launcher R2 publish

          Published **${ARTIFACT_VERSION}** from Desktop installers run \`${{ github.event.inputs.build_workflow_run_id }}\`.

          Channels: \`${PUBLISH_CHANNELS}\`.

          Full release required: ${{ github.event.inputs.require_all_channels }}.

          Git push: ${{ github.event.inputs.skip_git_push == 'true' && 'skipped (--skip-git-push)' || 'manifest committed and pushed' }}.
          EOF
