name: Desktop installers

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to build
        required: false
        default: main

      publish_windows_prod_to_r2:
        description: "Publish to R2 — requires Windows MSI (prod) + portable ZIP (prod) checked below"
        type: boolean
        default: false

      build_windows_msi_prod:
        description: "Build Windows MSI (prod)"
        type: boolean
        default: true

      build_windows_msi_dev:
        description: "Build Windows MSI (dev)"
        type: boolean
        default: false

      build_windows_portable_prod:
        description: "Build Windows portable ZIP (prod)"
        type: boolean
        default: true

      build_windows_portable_dev:
        description: "Build Windows portable ZIP (dev)"
        type: boolean
        default: false

      build_macos_arm64_dmg_prod:
        description: "Build macOS Apple Silicon DMG (prod)"
        type: boolean
        default: true

      build_macos_arm64_dmg_dev:
        description: "Build macOS Apple Silicon DMG (dev)"
        type: boolean
        default: false

      build_macos_x64_dmg_prod:
        description: "Build macOS Intel DMG (prod)"
        type: boolean
        default: true

      build_macos_x64_dmg_dev:
        description: "Build macOS Intel DMG (dev)"
        type: boolean
        default: false

concurrency:
  group: desktop-installers-${{ github.workflow }}-${{ github.event.inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  macos-matrix:
    name: macOS matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_targets: ${{ steps.set-matrix.outputs.has_targets }}
    steps:
      - id: set-matrix
        run: |
          include='[]'
          add_entry() {
            local jdk_arch="$1"
            local compose_host="$2"
            local expected_arch="$3"
            local variant="$4"
            local timeout_minutes="$5"
            include=$(echo "$include" | jq -c \
              --arg jdk "$jdk_arch" \
              --arg host "$compose_host" \
              --arg expected "$expected_arch" \
              --arg variant "$variant" \
              --argjson timeout "$timeout_minutes" \
              '. + [{"jdk_arch":$jdk,"compose_host":$host,"expected_arch":$expected,"variant":$variant,"timeout_minutes":$timeout}]')
          }
          if [ "${{ github.event.inputs.build_macos_arm64_dmg_prod }}" != "false" ]; then
            add_entry arm64 macos-arm64 arm64 prod 15
          fi
          if [ "${{ github.event.inputs.build_macos_arm64_dmg_dev }}" != "false" ]; then
            add_entry arm64 macos-arm64 arm64 dev 15
          fi
          if [ "${{ github.event.inputs.build_macos_x64_dmg_prod }}" != "false" ]; then
            add_entry x64 macos-x64 x86_64 prod 20
          fi
          if [ "${{ github.event.inputs.build_macos_x64_dmg_dev }}" != "false" ]; then
            add_entry x64 macos-x64 x86_64 dev 20
          fi
          count=$(echo "$include" | jq 'length')
          echo "matrix={\"include\":${include}}" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt 0 ]; then
            echo "has_targets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_targets=false" >> "$GITHUB_OUTPUT"
          fi

  build-macos:
    name: macOS ${{ matrix.compose_host }} (${{ matrix.variant }})
    needs: macos-matrix
    if: needs.macos-matrix.outputs.has_targets == 'true'
    runs-on: macos-latest
    timeout-minutes: ${{ matrix.timeout_minutes }}
    env:
      BUILD_NUMBER: ${{ github.run_number }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.macos-matrix.outputs.matrix) }}
    defaults:
      run:
        working-directory: launcher
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Ensure Rosetta (Intel build on Apple Silicon)
        if: matrix.jdk_arch == 'x64'
        run: /usr/sbin/softwareupdate --install-rosetta --agree-to-license

      - name: Set up JDK 17 (${{ matrix.jdk_arch }})
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          architecture: ${{ matrix.jdk_arch }}
          cache: gradle

      - name: Verify JVM architecture
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -XshowSettings:properties -version 2>&1 | grep "os.arch"

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./launcher/gradlew
        working-directory: ${{ github.workspace }}

      - name: Build macOS app image (${{ matrix.variant }})
        run: |
          args=(-PcomposeDesktopHost=${{ matrix.compose_host }} -PbuildNumber="$BUILD_NUMBER")
          if [ "${{ matrix.variant }}" = "dev" ]; then
            args+=(-PgameLauncherDev=true)
          fi
          ./gradlew :composeApp:createDistributable --no-daemon "${args[@]}"

      - name: Resolve packaging metadata (${{ matrix.variant }})
        run: |
          args=(-PbuildNumber="$BUILD_NUMBER")
          if [ "${{ matrix.variant }}" = "dev" ]; then
            args+=(-PgameLauncherDev=true)
          fi
          echo "ARTIFACT_VERSION=$(./gradlew -q :composeApp:printArtifactVersion --no-daemon "${args[@]}")" >> "$GITHUB_ENV"
          echo "APP_PACKAGE_NAME=$(./gradlew -q :composeApp:printAppPackageName --no-daemon "${args[@]}")" >> "$GITHUB_ENV"
          echo "DMG_VOLUME_NAME=$(./gradlew -q :composeApp:printMacOsDmgVolumeName --no-daemon "${args[@]}")" >> "$GITHUB_ENV"

      - name: Verify app binary architecture (${{ matrix.variant }})
        run: |
          BIN="composeApp/build/compose/binaries/main/app/${APP_PACKAGE_NAME}.app/Contents/MacOS/${APP_PACKAGE_NAME}"
          OUTPUT=$(file "$BIN")
          echo "$OUTPUT"
          case "${{ matrix.expected_arch }}" in
            arm64) echo "$OUTPUT" | grep -q 'arm64' || { echo "Expected arm64 binary"; exit 1; } ;;
            x86_64) echo "$OUTPUT" | grep -q 'x86_64' || { echo "Expected x86_64 binary"; exit 1; } ;;
            *) echo "Unknown expected_arch: ${{ matrix.expected_arch }}"; exit 1 ;;
          esac

      - name: Ad-hoc sign app bundle (${{ matrix.variant }})
        run: codesign --force --deep --sign - "composeApp/build/compose/binaries/main/app/${APP_PACKAGE_NAME}.app"

      - name: Create DMG (${{ matrix.variant }})
        run: |
          hdiutil create \
            -volname "$DMG_VOLUME_NAME" \
            -srcfolder "composeApp/build/compose/binaries/main/app/${APP_PACKAGE_NAME}.app" \
            -ov -format UDZO \
            "GameLauncher-${ARTIFACT_VERSION}-${{ matrix.compose_host }}.dmg"

      - name: Upload macOS DMG (${{ matrix.variant }})
        uses: actions/upload-artifact@v7
        with:
          name: GameLauncher-${{ matrix.compose_host }}-${{ matrix.variant }}
          path: launcher/GameLauncher-${{ env.ARTIFACT_VERSION }}-${{ matrix.compose_host }}.dmg
          if-no-files-found: error

      - name: macOS install notes (${{ matrix.variant }})
        run: |
          variant_note="Production build uses the live catalog."
          if [ "${{ matrix.variant }}" = "dev" ]; then
            variant_note="Dev build ships fake catalog data and shows **MC.GAME.LAUNCHER [DEV]** in the title bar."
          fi
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ### macOS artifacts (${{ matrix.compose_host }}, ${{ matrix.variant }})

          ${variant_note}

          GitHub adds a quarantine flag to downloaded files. After downloading:

          \`\`\`bash
          xattr -cr /Volumes/"$DMG_VOLUME_NAME"/${APP_PACKAGE_NAME}.app
          # or after copying the app out of the mounted DMG
          \`\`\`

          Then open **Game Launcher** normally. Build **${{ env.BUILD_NUMBER }}** is embedded in \`CFBundleVersion\`. Full Developer ID signing and notarization are planned later ([#9](https://github.com/morphingcoffee/GameLauncher/issues/9)).
          EOF

  windows-matrix:
    name: Windows matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_targets: ${{ steps.set-matrix.outputs.has_targets }}
    steps:
      - id: set-matrix
        run: |
          include='[]'
          add_entry() {
            local format="$1"
            local script="$2"
            local variant="$3"
            local artifact_slug="$4"
            local artifact_ext="$5"
            include=$(echo "$include" | jq -c \
              --arg format "$format" \
              --arg script "$script" \
              --arg variant "$variant" \
              --arg artifact_slug "$artifact_slug" \
              --arg artifact_ext "$artifact_ext" \
              '. + [{"format":$format,"script":$script,"variant":$variant,"artifact_slug":$artifact_slug,"artifact_ext":$artifact_ext}]')
          }
          if [ "${{ github.event.inputs.build_windows_msi_prod }}" != "false" ]; then
            add_entry msi package-windows-msi.ps1 prod msi msi
          fi
          if [ "${{ github.event.inputs.build_windows_msi_dev }}" != "false" ]; then
            add_entry msi package-windows-msi.ps1 dev msi msi
          fi
          if [ "${{ github.event.inputs.build_windows_portable_prod }}" != "false" ]; then
            add_entry "portable ZIP" package-windows-zip.ps1 prod portable zip
          fi
          if [ "${{ github.event.inputs.build_windows_portable_dev }}" != "false" ]; then
            add_entry "portable ZIP" package-windows-zip.ps1 dev portable zip
          fi
          count=$(echo "$include" | jq 'length')
          echo "matrix={\"include\":${include}}" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt 0 ]; then
            echo "has_targets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_targets=false" >> "$GITHUB_OUTPUT"
          fi

  build-windows:
    name: Windows ${{ matrix.format }} (${{ matrix.variant }})
    needs: windows-matrix
    if: needs.windows-matrix.outputs.has_targets == 'true'
    runs-on: windows-latest
    timeout-minutes: 15
    env:
      BUILD_NUMBER: ${{ github.run_number }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.windows-matrix.outputs.matrix) }}
    defaults:
      run:
        working-directory: launcher
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Verify WiX Toolset
        if: matrix.script == 'package-windows-msi.ps1'
        shell: pwsh
        run: |
          if (-not (Get-Command candle.exe -ErrorAction SilentlyContinue)) {
            Write-Host "candle.exe not on PATH; Gradle createDistributable will download WiX 3.11"
          } else {
            Write-Host "Pre-Gradle candle.exe: $((Get-Command candle.exe).Source)"
          }

      - name: Package ${{ matrix.format }} (${{ matrix.variant }})
        shell: pwsh
        run: |
          $args = @()
          if ("${{ matrix.variant }}" -eq "dev") {
            $args += "-Dev"
          }
          if ($args.Count -gt 0) {
            ..\tools\dev\${{ matrix.script }} @args
          } else {
            ..\tools\dev\${{ matrix.script }}
          }
        working-directory: launcher

      - name: Upload Windows ${{ matrix.format }} (${{ matrix.variant }})
        uses: actions/upload-artifact@v7
        with:
          name: GameLauncher-windows-${{ matrix.artifact_slug }}-${{ matrix.variant }}
          path: launcher/GameLauncher-*.${{ matrix.artifact_ext }}
          if-no-files-found: error

      - name: Windows install notes (${{ matrix.format }}, ${{ matrix.variant }})
        shell: bash
        run: |
          variant_note="Production build uses the live catalog."
          if [ "${{ matrix.variant }}" = "dev" ]; then
            variant_note="Dev build ships fake catalog data."
            if [ "${{ matrix.script }}" = "package-windows-msi.ps1" ]; then
              variant_note="${variant_note} Installs to a separate Start Menu group (**Game Launcher DEV**)."
            fi
          fi
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ### Windows ${{ matrix.format }} (${{ matrix.variant }})

          ${variant_note}

          Build **${{ env.BUILD_NUMBER }}**.
          EOF

  publish-launcher-r2:
    name: Publish Windows prod launcher to R2
    if: github.event.inputs.publish_windows_prod_to_r2 == 'true'
    needs:
      - windows-matrix
      - build-windows
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./launcher/gradlew

      - name: Resolve artifact version
        working-directory: launcher
        run: |
          echo "ARTIFACT_VERSION=$(./gradlew -q :composeApp:printArtifactVersion --no-daemon -PbuildNumber="$BUILD_NUMBER")" >> "$GITHUB_ENV"

      - name: Download Windows MSI (prod)
        uses: actions/download-artifact@v6
        with:
          name: GameLauncher-windows-msi-prod
          path: artifacts/windows-msi

      - name: Download Windows portable ZIP (prod)
        uses: actions/download-artifact@v6
        with:
          name: GameLauncher-windows-portable-prod
          path: artifacts/windows-portable

      - name: Stage prod launcher artifacts
        run: |
          set -euo pipefail
          msi=$(find artifacts/windows-msi -name 'GameLauncher-*.msi' | head -1)
          zip=$(find artifacts/windows-portable -name 'GameLauncher-*.zip' | head -1)
          test -n "$msi"
          test -n "$zip"
          mkdir -p "r2_staging/launcher/releases/${ARTIFACT_VERSION}/windows-x64-msi"
          mkdir -p "r2_staging/launcher/releases/${ARTIFACT_VERSION}/windows-x64-portable"
          cp "$msi" "r2_staging/launcher/releases/${ARTIFACT_VERSION}/windows-x64-msi/"
          cp "$zip" "r2_staging/launcher/releases/${ARTIFACT_VERSION}/windows-x64-portable/"

      - name: Register launcher release in manifest
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_CDN_BASE_URL: ${{ secrets.R2_PUBLIC_CDN_BASE_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          python3 tools/deploy/register_launcher_release.py "$ARTIFACT_VERSION" \
            --channel windows-x64-msi \
            --channel windows-x64-portable

      - name: Upload launcher blobs to R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_CDN_BASE_URL: ${{ secrets.R2_PUBLIC_CDN_BASE_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          python3 tools/deploy/r2_deploy.py --copy \
            "./r2_staging/launcher/releases/${ARTIFACT_VERSION}/windows-x64-msi" \
            "launcher/releases/${ARTIFACT_VERSION}/windows-x64-msi"
          python3 tools/deploy/r2_deploy.py --copy \
            "./r2_staging/launcher/releases/${ARTIFACT_VERSION}/windows-x64-portable" \
            "launcher/releases/${ARTIFACT_VERSION}/windows-x64-portable"

      - name: Publish manifest.json to R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_CDN_BASE_URL: ${{ secrets.R2_PUBLIC_CDN_BASE_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: python3 tools/deploy/r2_publish_manifest.py

      - name: Publish summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ### Launcher R2 publish

          Registered **${ARTIFACT_VERSION}** for \`windows-x64-msi\` and \`windows-x64-portable\`.
          Updated \`manifests/manifest.json\` locally in the runner — commit and push that file to \`main\` to keep git in sync.
          EOF
