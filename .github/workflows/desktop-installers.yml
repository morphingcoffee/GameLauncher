name: Desktop installers

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to build
        required: false
        default: main
      build_macos:
        description: Build macOS DMG and ZIP (Apple Silicon + Intel)
        type: boolean
        default: true
      build_windows:
        description: Build Windows MSI
        type: boolean
        default: true
      build_windows_zip:
        description: Build Windows portable ZIP
        type: boolean
        default: true

concurrency:
  group: desktop-installers-${{ github.workflow }}-${{ github.event.inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: macOS ${{ matrix.compose_host }} (DMG + app zip)
    if: github.event.inputs.build_macos != 'false'
    runs-on: macos-latest
    timeout-minutes: 15
    env:
      BUILD_NUMBER: ${{ github.run_number }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - jdk_arch: arm64
            compose_host: macos-arm64
            expected_arch: arm64
          - jdk_arch: x64
            compose_host: macos-x64
            expected_arch: x86_64
    defaults:
      run:
        working-directory: launcher
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Ensure Rosetta (Intel build on Apple Silicon)
        if: matrix.jdk_arch == 'x64'
        run: /usr/sbin/softwareupdate --install-rosetta --agree-to-license

      - name: Set up JDK 17 (${{ matrix.jdk_arch }})
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          architecture: ${{ matrix.jdk_arch }}
          cache: gradle

      - name: Verify JVM architecture
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -XshowSettings:properties -version 2>&1 | grep "os.arch"

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./launcher/gradlew
        working-directory: ${{ github.workspace }}

      - name: Build macOS app image
        run: ./gradlew :composeApp:createDistributable --no-daemon -PcomposeDesktopHost=${{ matrix.compose_host }} -PbuildNumber=$BUILD_NUMBER

      - name: Verify app binary architecture
        run: |
          BIN="composeApp/build/compose/binaries/main/app/GameLauncher.app/Contents/MacOS/GameLauncher"
          OUTPUT=$(file "$BIN")
          echo "$OUTPUT"
          case "${{ matrix.expected_arch }}" in
            arm64) echo "$OUTPUT" | grep -q 'arm64' || { echo "Expected arm64 binary"; exit 1; } ;;
            x86_64) echo "$OUTPUT" | grep -q 'x86_64' || { echo "Expected x86_64 binary"; exit 1; } ;;
            *) echo "Unknown expected_arch: ${{ matrix.expected_arch }}"; exit 1 ;;
          esac

      - name: Ad-hoc sign app bundle
        run: codesign --force --deep --sign - "composeApp/build/compose/binaries/main/app/GameLauncher.app"

      - name: Resolve artifact version
        run: echo "ARTIFACT_VERSION=$(./gradlew -q :composeApp:printArtifactVersion --no-daemon -PbuildNumber=$BUILD_NUMBER)" >> "$GITHUB_ENV"

      - name: Create DMG from signed app
        run: |
          hdiutil create \
            -volname "Game Launcher" \
            -srcfolder "composeApp/build/compose/binaries/main/app/GameLauncher.app" \
            -ov -format UDZO \
            "GameLauncher-${ARTIFACT_VERSION}-${{ matrix.compose_host }}.dmg"

      - name: Create portable ZIP
        run: |
          ditto -c -k --keepParent \
            "composeApp/build/compose/binaries/main/app/GameLauncher.app" \
            "GameLauncher-${ARTIFACT_VERSION}-${{ matrix.compose_host }}.zip"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GameLauncher-${{ matrix.compose_host }}
          path: |
            launcher/GameLauncher-${{ env.ARTIFACT_VERSION }}-${{ matrix.compose_host }}.dmg
            launcher/GameLauncher-${{ env.ARTIFACT_VERSION }}-${{ matrix.compose_host }}.zip
          if-no-files-found: error

      - name: macOS install notes
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ### macOS artifacts (${{ matrix.compose_host }})

          GitHub adds a quarantine flag to downloaded files. After downloading:

          ```bash
          xattr -cr GameLauncher.app   # if using the zip
          # or, for the DMG: mount it, then run the same on the copied .app
          ```

          Then open **Game Launcher** normally. Build **${{ env.BUILD_NUMBER }}** is embedded in `CFBundleVersion`. Full Developer ID signing and notarization are planned later ([#9](https://github.com/morphingcoffee/GameLauncher/issues/9)).
          EOF

  build-windows:
    name: Windows (MSI)
    if: github.event.inputs.build_windows != 'false'
    runs-on: windows-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: launcher
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # windows-latest ships WiX 3.14+; do not pin an older Chocolatey version (downgrade fails).
      - name: Verify WiX Toolset
        shell: pwsh
        run: |
          if (-not (Get-Command candle.exe -ErrorAction SilentlyContinue)) {
            choco install wixtoolset -y --no-progress
          }

      - name: Package MSI
        shell: pwsh
        run: .\gradlew.bat :composeApp:packageMsi --no-daemon

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameLauncher-windows
          path: launcher/composeApp/build/compose/binaries/main/msi/*.msi
          if-no-files-found: error

      - name: Windows install notes
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ### Windows artifact

          Run the MSI installer. Windows SmartScreen may warn about an unknown publisher — choose **More info** → **Run anyway**. Authenticode signing is planned for a later release.
          EOF

  build-windows-zip:
    name: Windows (portable ZIP)
    if: github.event.inputs.build_windows_zip != 'false'
    runs-on: windows-latest
    timeout-minutes: 10
    env:
      BUILD_NUMBER: ${{ github.run_number }}
    defaults:
      run:
        working-directory: launcher
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Package portable ZIP
        shell: pwsh
        run: ..\tools\dev\package-windows-zip.ps1
        working-directory: launcher

      - name: Resolve artifact version
        shell: pwsh
        run: |
          $artifactVersion = .\gradlew.bat -q :composeApp:printArtifactVersion --no-daemon "-PbuildNumber=$($env:BUILD_NUMBER)"
          "ARTIFACT_VERSION=$artifactVersion" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload Windows portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: GameLauncher-windows-zip-${{ env.ARTIFACT_VERSION }}
          path: launcher/GameLauncher-${{ env.ARTIFACT_VERSION }}-windows.zip
          if-no-files-found: error

      - name: Windows ZIP install notes
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ### Windows portable ZIP

          Unzip and run `GameLauncher.exe` inside `GameLauncher-0.0.1-build<run>/`. No Start Menu entry or installer wizard.

          **Upgrade:** replace the extracted folder with a newer ZIP.

          **Build:** `${{ env.BUILD_NUMBER }}` (artifact version `0.0.1-build<run>`).

          Downloaded games live in `%APPDATA%\GameLauncher` — deleting the portable folder does not remove them.
          EOF
