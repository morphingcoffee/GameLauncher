name: Desktop installers

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to build
        required: false
        default: main
      build_macos_arm64:
        description: Build macOS Apple Silicon (arm64) — DMG + ZIP
        type: boolean
        default: true
      build_macos_x64:
        description: Build macOS Intel (x64) — DMG + ZIP
        type: boolean
        default: true
      build_macos_prod:
        description: Build macOS production variant
        type: boolean
        default: true
      build_macos_dev:
        description: Build macOS dev variant (fake catalog, [DEV] title bar)
        type: boolean
        default: true
      build_windows:
        description: Build Windows MSI installer
        type: boolean
        default: true
      build_windows_zip:
        description: Build Windows portable ZIP
        type: boolean
        default: true

concurrency:
  group: desktop-installers-${{ github.workflow }}-${{ github.event.inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  macos-matrix:
    name: macOS matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_targets: ${{ steps.set-matrix.outputs.has_targets }}
    steps:
      - id: set-matrix
        run: |
          include='[]'
          add_entries() {
            local jdk_arch="$1"
            local compose_host="$2"
            local expected_arch="$3"
            local timeout_minutes="$4"
            if [ "${{ github.event.inputs.build_macos_prod }}" != "false" ]; then
              include=$(echo "$include" | jq -c \
                --arg jdk "$jdk_arch" \
                --arg host "$compose_host" \
                --arg expected "$expected_arch" \
                --argjson timeout "$timeout_minutes" \
                '. + [{"jdk_arch":$jdk,"compose_host":$host,"expected_arch":$expected,"variant":"prod","timeout_minutes":$timeout}]')
            fi
            if [ "${{ github.event.inputs.build_macos_dev }}" != "false" ]; then
              include=$(echo "$include" | jq -c \
                --arg jdk "$jdk_arch" \
                --arg host "$compose_host" \
                --arg expected "$expected_arch" \
                --argjson timeout "$timeout_minutes" \
                '. + [{"jdk_arch":$jdk,"compose_host":$host,"expected_arch":$expected,"variant":"dev","timeout_minutes":$timeout}]')
            fi
          }
          if [ "${{ github.event.inputs.build_macos_arm64 }}" != "false" ]; then
            add_entries arm64 macos-arm64 arm64 15
          fi
          if [ "${{ github.event.inputs.build_macos_x64 }}" != "false" ]; then
            add_entries x64 macos-x64 x86_64 20
          fi
          count=$(echo "$include" | jq 'length')
          echo "matrix={\"include\":${include}}" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt 0 ]; then
            echo "has_targets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_targets=false" >> "$GITHUB_OUTPUT"
          fi

  build-macos:
    name: macOS ${{ matrix.compose_host }} (${{ matrix.variant }})
    needs: macos-matrix
    if: needs.macos-matrix.outputs.has_targets == 'true'
    runs-on: macos-latest
    timeout-minutes: ${{ matrix.timeout_minutes }}
    env:
      BUILD_NUMBER: ${{ github.run_number }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.macos-matrix.outputs.matrix) }}
    defaults:
      run:
        working-directory: launcher
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Ensure Rosetta (Intel build on Apple Silicon)
        if: matrix.jdk_arch == 'x64'
        run: /usr/sbin/softwareupdate --install-rosetta --agree-to-license

      - name: Set up JDK 17 (${{ matrix.jdk_arch }})
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          architecture: ${{ matrix.jdk_arch }}
          cache: gradle

      - name: Verify JVM architecture
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -XshowSettings:properties -version 2>&1 | grep "os.arch"

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./launcher/gradlew
        working-directory: ${{ github.workspace }}

      - name: Build macOS app image (${{ matrix.variant }})
        run: |
          args=(-PcomposeDesktopHost=${{ matrix.compose_host }} -PbuildNumber="$BUILD_NUMBER")
          if [ "${{ matrix.variant }}" = "dev" ]; then
            args+=(-PgameLauncherDev=true)
          fi
          ./gradlew :composeApp:createDistributable --no-daemon "${args[@]}"

      - name: Resolve packaging metadata (${{ matrix.variant }})
        run: |
          args=(-PbuildNumber="$BUILD_NUMBER")
          if [ "${{ matrix.variant }}" = "dev" ]; then
            args+=(-PgameLauncherDev=true)
          fi
          echo "ARTIFACT_VERSION=$(./gradlew -q :composeApp:printArtifactVersion --no-daemon "${args[@]}")" >> "$GITHUB_ENV"
          echo "APP_PACKAGE_NAME=$(./gradlew -q :composeApp:printAppPackageName --no-daemon "${args[@]}")" >> "$GITHUB_ENV"
          echo "DMG_VOLUME_NAME=$(./gradlew -q :composeApp:printMacOsDmgVolumeName --no-daemon "${args[@]}")" >> "$GITHUB_ENV"

      - name: Verify app binary architecture (${{ matrix.variant }})
        run: |
          BIN="composeApp/build/compose/binaries/main/app/${APP_PACKAGE_NAME}.app/Contents/MacOS/${APP_PACKAGE_NAME}"
          OUTPUT=$(file "$BIN")
          echo "$OUTPUT"
          case "${{ matrix.expected_arch }}" in
            arm64) echo "$OUTPUT" | grep -q 'arm64' || { echo "Expected arm64 binary"; exit 1; } ;;
            x86_64) echo "$OUTPUT" | grep -q 'x86_64' || { echo "Expected x86_64 binary"; exit 1; } ;;
            *) echo "Unknown expected_arch: ${{ matrix.expected_arch }}"; exit 1 ;;
          esac

      - name: Ad-hoc sign app bundle (${{ matrix.variant }})
        run: codesign --force --deep --sign - "composeApp/build/compose/binaries/main/app/${APP_PACKAGE_NAME}.app"

      - name: Create DMG and ZIP (${{ matrix.variant }})
        run: |
          hdiutil create \
            -volname "$DMG_VOLUME_NAME" \
            -srcfolder "composeApp/build/compose/binaries/main/app/${APP_PACKAGE_NAME}.app" \
            -ov -format UDZO \
            "GameLauncher-${ARTIFACT_VERSION}-${{ matrix.compose_host }}.dmg"

          ditto -c -k --keepParent \
            "composeApp/build/compose/binaries/main/app/${APP_PACKAGE_NAME}.app" \
            "GameLauncher-${ARTIFACT_VERSION}-${{ matrix.compose_host }}.zip"

      - name: Upload macOS artifacts (${{ matrix.variant }})
        uses: actions/upload-artifact@v4
        with:
          name: GameLauncher-${{ matrix.compose_host }}-${{ matrix.variant }}
          path: |
            launcher/GameLauncher-${{ env.ARTIFACT_VERSION }}-${{ matrix.compose_host }}.dmg
            launcher/GameLauncher-${{ env.ARTIFACT_VERSION }}-${{ matrix.compose_host }}.zip
          if-no-files-found: error

      - name: macOS install notes (${{ matrix.variant }})
        run: |
          variant_note="Production build uses the live catalog."
          if [ "${{ matrix.variant }}" = "dev" ]; then
            variant_note="Dev build ships fake catalog data and shows **MC.GAME.LAUNCHER [DEV]** in the title bar."
          fi
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ### macOS artifacts (${{ matrix.compose_host }}, ${{ matrix.variant }})

          ${variant_note}

          GitHub adds a quarantine flag to downloaded files. After downloading:

          \`\`\`bash
          xattr -cr GameLauncher.app   # if using the zip
          # or, for the DMG: mount it, then run the same on the copied .app
          \`\`\`

          Then open **Game Launcher** normally. Build **${{ env.BUILD_NUMBER }}** is embedded in \`CFBundleVersion\`. Full Developer ID signing and notarization are planned later ([#9](https://github.com/morphingcoffee/GameLauncher/issues/9)).
          EOF

  build-windows-msi:
    name: Windows (MSI)
    if: github.event.inputs.build_windows != 'false'
    runs-on: windows-latest
    timeout-minutes: 10
    env:
      BUILD_NUMBER: ${{ github.run_number }}
    defaults:
      run:
        working-directory: launcher
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # JDK 17 jpackage needs WiX 3.x candle/light. package-windows-msi.ps1 prefers
      # composeApp/build/wix311 from Gradle; skip relying on the runner image WiX 3.14.
      - name: Verify WiX Toolset
        shell: pwsh
        run: |
          if (-not (Get-Command candle.exe -ErrorAction SilentlyContinue)) {
            Write-Host "candle.exe not on PATH; Gradle createDistributable will download WiX 3.11"
          } else {
            Write-Host "Pre-Gradle candle.exe: $((Get-Command candle.exe).Source)"
          }

      - name: Package prod MSI
        shell: pwsh
        run: ..\tools\dev\package-windows-msi.ps1
        working-directory: launcher

      - name: Package dev MSI
        shell: pwsh
        run: ..\tools\dev\package-windows-msi.ps1 -Dev
        working-directory: launcher

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: GameLauncher-windows-msi
          path: launcher/GameLauncher-*.msi
          if-no-files-found: error

      - name: Windows MSI install notes
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ### Windows MSI

          Artifact includes **prod** and **dev** (`-dev` in filename) installers. Dev builds use fake catalog data and a separate Start Menu group (**Game Launcher DEV**).

          Run the installer. Windows SmartScreen may warn about an unknown publisher — choose **More info** → **Run anyway**. Authenticode signing is tracked in [#45](https://github.com/morphingcoffee/GameLauncher/issues/45).

          **After install:** search Start for **Game Launcher**; a desktop shortcut is created by default.

          **Build:** `${{ env.BUILD_NUMBER }}` (MSI product version `1.0.<build>`).

          **Upgrades:** install a newer CI MSI over an existing install. If you installed an older MSI built *before* [#37](https://github.com/morphingcoffee/GameLauncher/issues/37), uninstall once from Settings → Apps first.

          Downloaded games live in `%APPDATA%\GameLauncher` — uninstalling the launcher does not remove them.
          EOF

  build-windows-zip:
    name: Windows (portable ZIP)
    if: github.event.inputs.build_windows_zip != 'false'
    runs-on: windows-latest
    timeout-minutes: 10
    env:
      BUILD_NUMBER: ${{ github.run_number }}
    defaults:
      run:
        working-directory: launcher
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Package prod portable ZIP
        shell: pwsh
        run: ..\tools\dev\package-windows-zip.ps1
        working-directory: launcher

      - name: Package dev portable ZIP
        shell: pwsh
        run: ..\tools\dev\package-windows-zip.ps1 -Dev
        working-directory: launcher

      - name: Upload Windows portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: GameLauncher-windows-portable
          path: launcher/GameLauncher-*.zip
          if-no-files-found: error

      - name: Windows ZIP install notes
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ### Windows portable ZIP

          Artifact includes **prod** and **dev** (`-dev` in filename) portable folders. Dev builds use fake catalog data.

          Unzip and run `GameLauncher.exe` (prod) or `GameLauncherDev.exe` (dev) inside the versioned folder. No Start Menu entry or installer wizard.

          **Upgrade:** replace the extracted folder with a newer ZIP.

          **Build:** `${{ env.BUILD_NUMBER }}` (artifact version `0.0.1-build<run>`).

          Downloaded games live in `%APPDATA%\GameLauncher` — deleting the portable folder does not remove them.
          EOF
