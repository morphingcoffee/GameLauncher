name: Register game version

on:
  workflow_dispatch:
    inputs:
      game_id:
        description: Game identifier (stable slug, e.g. cool_game)
        required: true
        type: string
      version:
        description: Semantic version (e.g. 1.2.0)
        required: true
        type: string
      platforms:
        description: Comma-separated platform keys (windows-x64, macos-arm64, macos-x64)
        required: true
        type: string
      builds_json:
        description: >
          JSON object keyed by platform with executable_path, file_size_bytes, sha256.
          Example: {"macos-arm64":{"executable_path":"Game.app/Contents/MacOS/Game","file_size_bytes":12345,"sha256":"abc..."}}
        required: true
        type: string
      title:
        description: Game title (required when adding a new game to the catalog)
        required: false
        type: string
      description:
        description: Short browse-view description
        required: false
        type: string
      thumbnail_url:
        description: Public CDN URL to thumbnail (assets/{game_id}/thumbnail.webp)
        required: false
        type: string
      released_at:
        description: Release date (YYYY-MM-DD, UTC). Defaults to today.
        required: false
        type: string
      update_catalog_latest:
        description: Update latest_version and inline builds in the catalog manifest
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: register-game-version
  cancel-in-progress: false

jobs:
  register:
    name: Register build and update catalog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Register version
        env:
          GAME_ID: ${{ github.event.inputs.game_id }}
          VERSION: ${{ github.event.inputs.version }}
          PLATFORMS: ${{ github.event.inputs.platforms }}
          BUILDS_JSON: ${{ github.event.inputs.builds_json }}
          TITLE: ${{ github.event.inputs.title }}
          DESCRIPTION: ${{ github.event.inputs.description }}
          THUMBNAIL_URL: ${{ github.event.inputs.thumbnail_url }}
          RELEASED_AT: ${{ github.event.inputs.released_at }}
          UPDATE_CATALOG_LATEST: ${{ github.event.inputs.update_catalog_latest }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_PUBLIC_CDN_BASE_URL: ${{ secrets.R2_PUBLIC_CDN_BASE_URL }}
        run: python3 tools/deploy/register_game_version.py
